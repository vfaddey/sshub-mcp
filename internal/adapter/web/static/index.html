<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>sshub-mcp</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/styles.css" />
    </head>
    <body>
        <div class="noise" aria-hidden="true"></div>
        <header class="top">
            <div class="brand">
                <span class="brand-mark">◇</span>
                <div>
                    <h1>sshub-mcp</h1>
                    <p class="tagline">
                        projects · hosts · tokens for your MCP client
                    </p>
                </div>
            </div>
            <div class="pill" title="No authentication — keep it on localhost">
                local admin
            </div>
        </header>

        <main class="grid">
            <section class="panel" id="panel-projects">
                <div class="panel-head">
                    <h2>Projects</h2>
                    <button
                        type="button"
                        class="btn ghost icon"
                        id="btn-refresh-projects"
                        aria-label="Refresh projects"
                        title="Refresh"
                    >
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path
                                fill="currentColor"
                                d="M12 6a6 6 0 1 1-5.65 8H4.26A8 8 0 1 0 12 4V1l4 3-4 3V6z"
                            />
                        </svg>
                    </button>
                </div>
                <form id="form-project" class="inline-form">
                    <input
                        type="text"
                        name="name"
                        placeholder="project name"
                        required
                        autocomplete="off"
                        aria-label="Project name"
                    />
                    <button type="submit" class="btn primary">add</button>
                </form>
                <ul id="list-projects" class="list"></ul>
            </section>

            <section class="panel" id="panel-hosts">
                <div class="panel-head">
                    <h2>Hosts</h2>
                    <select
                        id="select-project"
                        class="select"
                        aria-label="Project"
                    >
                        <option value="">— select a project —</option>
                    </select>
                </div>
                <form id="form-host" class="stack-form hidden">
                    <div class="row2">
                        <label
                            >name<input
                                type="text"
                                name="name"
                                required
                                autocomplete="off"
                                aria-label="Host name"
                        /></label>
                        <label
                            >address<input
                                type="text"
                                name="address"
                                required
                                placeholder="host or IP"
                                aria-label="Host address"
                        /></label>
                    </div>
                    <div class="row2">
                        <label
                            >port<input
                                type="number"
                                name="port"
                                value="22"
                                min="1"
                                max="65535"
                                aria-label="Port"
                        /></label>
                        <label
                            >username<input
                                type="text"
                                name="username"
                                required
                                autocomplete="off"
                                aria-label="Username"
                        /></label>
                    </div>
                    <label
                        >auth
                        <select
                            name="auth_kind"
                            class="select full"
                            aria-label="Auth kind"
                        >
                            <option value="none">none</option>
                            <option value="password">password</option>
                            <option value="agent">agent (SSH_AUTH_SOCK)</option>
                        </select>
                    </label>
                    <label class="hidden" id="wrap-password"
                        >password<input
                            type="password"
                            name="password"
                            autocomplete="new-password"
                            aria-label="Password"
                    /></label>
                    <button type="submit" class="btn primary">add host</button>
                </form>
                <ul id="list-hosts" class="list"></ul>
            </section>

            <section class="panel panel-wide" id="panel-tokens">
                <div class="panel-head">
                    <h2>API token</h2>
                    <button
                        type="button"
                        class="btn ghost icon"
                        id="btn-refresh-tokens"
                        aria-label="Refresh tokens"
                        title="Refresh"
                    >
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path
                                fill="currentColor"
                                d="M12 6a6 6 0 1 1-5.65 8H4.26A8 8 0 1 0 12 4V1l4 3-4 3V6z"
                            />
                        </svg>
                    </button>
                </div>

                <p class="hint">
                    The secret is shown once. Save it and use it as a Bearer
                    token for MCP.
                </p>

                <form id="form-token" class="stack-form">
                    <label
                        >label<input
                            type="text"
                            name="label"
                            required
                            placeholder="e.g. cursor-home"
                            aria-label="Token label"
                    /></label>
                    <fieldset class="checks">
                        <legend>projects</legend>
                        <div id="token-project-checks" class="check-grid"></div>
                    </fieldset>
                    <button type="submit" class="btn accent">
                        issue token
                    </button>
                </form>

                <div id="token-result" class="token-box hidden" tabindex="-1">
                    <span class="token-label">secret (copy now)</span>
                    <code id="token-value"></code>
                    <button type="button" class="btn ghost" id="btn-copy-token">
                        copy
                    </button>
                </div>

                <div class="panel-subhead">
                    <h3>Issued tokens</h3>
                </div>
                <ul id="list-tokens" class="list"></ul>
            </section>
        </main>

        <div id="toast" class="toast hidden" role="status"></div>
        <script src="assets/app.js" defer></script>
    </body>
</html>
